<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نینجا رانر v0.4 - موبایل</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  body{background:#1a1a2e;font-family:Tahoma;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;touch-action:none}
  #gameContainer{position:relative;width:100%;max-width:500px;aspect-ratio:9/5;touch-action:none}
  canvas{width:100%;height:100%;border:3px solid #0f3460;background:linear-gradient(to bottom,#16213e 0%,#0f3460 100%);display:block;touch-action:none}
  #hud{position:absolute;top:5px;left:8px;color:#fff;font-size:clamp(10px,2.2vw,16px);text-shadow:2px 2px 4px #000;z-index:10;pointer-events:none}
  #hpBar{width:clamp(80px,18vw,150px);height:clamp(12px,2.5vw,20px);background:#300;border:2px solid #fff;margin-top:3px;border-radius:4px;overflow:hidden}
  #hpFill{height:100%;background:#e94560;transition:width 0.2s}
  #controls{display:none}
  
  /* صفحه شروع */
  #startScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:20;padding:20px;text-align:center}
  #startScreen h1{font-size:clamp(28px,7vw,48px);color:#e94560;margin-bottom:10px;text-shadow:3px 3px 0px #0f3460}
  #startScreen p{font-size:clamp(12px,2.5vw,18px);margin-bottom:15px;padding:0 10px}
  #startScreen button{padding:clamp(10px,2.5vw,15px) clamp(25px,6vw,40px);font-size:clamp(16px,4vw,22px);background:#e94560;border:none;color:#fff;border-radius:10px;cursor:pointer;margin:5px;touch-action:manipulation;min-height:50px;min-width:150px}
  #startScreen button:hover{background:#ff6b81}
  #startScreen button:active{transform:scale(0.95)}
  
  #scoreSection{width:95%;max-width:400px;margin-top:10px}
  #scoreSection h3{font-size:clamp(14px,3vw,20px);color:#e94560;margin-bottom:5px}
  #leaderboardContainer{max-height:clamp(120px,25vh,200px);overflow-y:auto;margin:5px 0;background:rgba(0,0,0,0.3);border-radius:8px;padding:5px}
  #leaderboardContainer::-webkit-scrollbar{width:4px}
  #leaderboardContainer::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);border-radius:10px}
  #leaderboardContainer::-webkit-scrollbar-thumb{background:#e94560;border-radius:10px}
  .leaderboard-item{display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:clamp(11px,2vw,14px);color:#ddd}
  .leaderboard-item .rank{color:#e94560;font-weight:bold;min-width:25px}
  .leaderboard-item .name{flex:1;text-align:right;margin:0 8px;color:#fff}
  .leaderboard-item .score{color:#ffd700;font-weight:bold}
  #loadingText{color:#aaa;text-align:center;padding:15px;font-size:clamp(12px,2vw,14px)}
  
  .refresh-btn{padding:6px 15px;background:#0f3460;border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:clamp(11px,2vw,14px);touch-action:manipulation;min-height:35px}
  .refresh-btn:active{transform:scale(0.95)}
  
  /* صفحه Game Over */
  #gameOver{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:20;padding:15px;text-align:center}
  #gameOver h2{font-size:clamp(30px,7vw,48px);margin-bottom:5px}
  #gameOver p{font-size:clamp(14px,3vw,18px);margin:3px 0}
  #gameOver .player-name-input{display:flex;gap:8px;margin:8px 0;justify-content:center;flex-wrap:wrap;width:100%;max-width:350px}
  #gameOver .player-name-input input{padding:8px 12px;border-radius:8px;border:2px solid #0f3460;background:rgba(255,255,255,0.1);color:#fff;font-size:clamp(14px,3vw,16px);width:min(180px,60%);min-height:40px}
  #gameOver .player-name-input input::placeholder{color:#888}
  #gameOver .player-name-input button{padding:8px 16px;border:none;border-radius:8px;background:#e94560;color:#fff;cursor:pointer;font-size:clamp(13px,2.5vw,15px);min-height:40px;touch-action:manipulation}
  #gameOver .player-name-input button:active{transform:scale(0.95)}
  #gameOver .save-status{color:#4caf50;font-size:clamp(12px,2vw,14px);min-height:25px;margin:3px 0}
  #gameOver .save-status.error{color:#e94560}
  #gameOver .restart-btn{padding:clamp(12px,3vw,18px) clamp(30px,7vw,45px);font-size:clamp(16px,4vw,22px);background:#e94560;border:none;color:#fff;border-radius:10px;cursor:pointer;margin-top:10px;touch-action:manipulation;min-height:50px;min-width:130px}
  #gameOver .restart-btn:active{transform:scale(0.95)}
  #scoreSectionGameOver{width:95%;max-width:400px;margin-top:5px}
  #scoreSectionGameOver h3{font-size:clamp(13px,2.5vw,18px);color:#e94560;margin:3px 0}
  #leaderboardContainerGameOver{max-height:clamp(100px,20vh,180px);overflow-y:auto;margin:3px 0;background:rgba(0,0,0,0.3);border-radius:8px;padding:5px}
  
  /* کنترل‌های لمسی موبایل */
  #mobileControls{position:absolute;bottom:clamp(5px,1.5vw,15px);left:0;right:0;display:flex;justify-content:space-between;padding:0 clamp(8px,2vw,20px);z-index:15;pointer-events:none}
  .mBtn-group{display:flex;gap:clamp(8px,2vw,15px);pointer-events:auto}
  .mBtn{width:clamp(50px,12vw,70px);height:clamp(50px,12vw,70px);background:rgba(255,255,255,0.15);border:2.5px solid rgba(255,255,255,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(20px,5vw,30px);color:#fff;touch-action:manipulation;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:0 4px 15px rgba(0,0,0,0.3);transition:all 0.1s;min-width:44px;min-height:44px}
  .mBtn:active{transform:scale(0.88);background:rgba(255,255,255,0.3);border-color:#e94560}
  .mBtn.jump-btn{background:rgba(233,69,96,0.3);border-color:#e94560;width:clamp(60px,14vw,80px);height:clamp(60px,14vw,80px);font-size:clamp(24px,5.5vw,34px)}
  .mBtn.jump-btn:active{background:rgba(233,69,96,0.6)}
  .mBtn.duck-btn{background:rgba(15,52,96,0.3);border-color:#0f3460}
  .mBtn.duck-btn:active{background:rgba(15,52,96,0.6)}
  
  /* مخفی کردن کنترلها در دسکتاپ */
  @media (min-width:769px){#mobileControls{display:none !important}}
  
  @media (max-width:400px){
    .mBtn{width:clamp(40px,11vw,50px);height:clamp(40px,11vw,50px);font-size:clamp(16px,4.5vw,22px)}
    .mBtn.jump-btn{width:clamp(48px,13vw,60px);height:clamp(48px,13vw,60px);font-size:clamp(20px,5vw,28px)}
    #gameOver .player-name-input input{width:min(140px,50%)}
  }
  
  @media (max-height:600px){
    .mBtn{width:clamp(35px,9vw,50px);height:clamp(35px,9vw,50px);font-size:clamp(14px,4vw,20px)}
    .mBtn.jump-btn{width:clamp(42px,11vw,58px);height:clamp(42px,11vw,58px);font-size:clamp(18px,4.5vw,26px)}
    #startScreen h1{font-size:clamp(20px,5vw,32px)}
    #startScreen p{font-size:clamp(10px,2vw,14px);margin-bottom:8px}
    #startScreen button{padding:8px 20px;font-size:clamp(14px,3.5vw,18px);min-height:40px}
    #scoreSection{max-height:100px}
    #leaderboardContainer{max-height:60px}
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game" width="900" height="500"></canvas>
  
  <div id="hud">
    <div>امتیاز: <span id="score">0</span> | فاصله: <span id="distance">0</span>m</div>
    <div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
  </div>
  
  <div id="startScreen">
    <h1>🥷 نینجا رانر</h1>
    <p>کلاغ‌های ژاپنی در کمین! جاخالی بده و زنده بمون</p>
    <button onclick="startGame()">▶ شروع بازی</button>
    
    <div id="scoreSection">
      <h3>🏆 بهترین امتیازات</h3>
      <div id="leaderboardContainer">
        <p id="loadingText">در حال بارگذاری...</p>
      </div>
      <button class="refresh-btn" onclick="refreshLeaderboard()">🔄 بروزرسانی</button>
    </div>
    
    <p style="margin-top:8px;font-size:clamp(10px,2vw,14px);color:#aaa">🍎 سیب = +1 جون | 🐦‍⬛ کلاغ = -2 جون</p>
  </div>
  
  <div id="gameOver">
    <h2 id="gameOverText">باختی!</h2>
    <p>امتیاز نهایی: <span id="finalScore">0</span></p>
    
    <div class="player-name-input">
      <input type="text" id="playerNameInput" placeholder="نام خود را وارد کنید..." maxlength="20">
      <button onclick="savePlayerScore()">💾 ثبت</button>
    </div>
    <div id="saveStatus" class="save-status"></div>
    
    <div id="scoreSectionGameOver">
      <h3>🏆 بهترین امتیازات</h3>
      <div id="leaderboardContainerGameOver">
        <p id="loadingTextGameOver" style="color:#aaa;text-align:center;padding:10px;font-size:clamp(12px,2vw,14px)">در حال بارگذاری...</p>
      </div>
    </div>
    
    <button class="restart-btn" onclick="restartGame()">🔄 دوباره</button>
  </div>
  
  <div id="mobileControls">
    <div class="mBtn-group">
      <div class="mBtn" id="leftBtn">◀</div>
      <div class="mBtn" id="rightBtn">▶</div>
    </div>
    <div class="mBtn-group">
      <div class="mBtn duck-btn" id="duckBtn">▼</div>
      <div class="mBtn jump-btn" id="jumpBtn">▲</div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
// ========== متغیرهای بازی ==========
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 500;

let gameRunning = false;
let gameOver = false;
let musicOn = true;
let animationId = null;
let currentScore = 0;
let currentDistance = 0;

// ========== موسیقی ==========
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let musicGain = audioCtx.createGain();
musicGain.gain.value = 0.08;
musicGain.connect(audioCtx.destination);

function playMusic(){
  if(!musicOn||!gameRunning) return;
  const melody = [523,587,659,783,880,783,659,587,523,659,783,880,783,659,587,523];
  let t = audioCtx.currentTime;
  melody.forEach((freq,i)=>{
    if(freq===0) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2,t+i*0.18);
    gain.gain.exponentialRampToValueAtTime(0.01,t+i*0.18+0.16);
    osc.connect(gain); gain.connect(musicGain);
    osc.start(t+i*0.18); osc.stop(t+i*0.18+0.18);
  });
  setTimeout(()=>{if(gameRunning&&musicOn)playMusic()}, melody.length*180);
}

function playSound(type){
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type==='jump'){
      osc.frequency.value=400; osc.type='sine';
      gain.gain.setValueAtTime(0.12,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.08);
      osc.start(); osc.stop(audioCtx.currentTime+0.08);
    }else if(type==='pickup'){
      osc.frequency.setValueAtTime(659,audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1047,audioCtx.currentTime+0.08);
      gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.12);
      osc.start(); osc.stop(audioCtx.currentTime+0.12);
    }else if(type==='hit'){
      osc.frequency.value=150; osc.type='sawtooth';
      gain.gain.setValueAtTime(0.25,audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.15);
      osc.start(); osc.stop(audioCtx.currentTime+0.15);
    }
  }catch(e){}
}

// ========== بازی ==========
const player = {
  x:100,y:0,w:34,h:44,
  vx:0,vy:0,speed:4.5,jumpPower:-13,
  grounded:false,ducking:false,hp:5,maxHp:5,
  invincible:0,animFrame:0,runCycle:0
};

let camera = {x:0};
let score = 0;
let platforms = [];
let apples = [];
let crows = [];
let particles = [];
let clouds = [];
let cherryBlossoms = [];
let finishFlag = {x:5000,y:H-200,w:30,h:200};
let lastCrowSpawnX = 0;
let totalCrowsSpawned = 0;

function createLevel(){
  platforms = [
    {x:0,y:H-50,w:2000,h:50},
    {x:300,y:H-150,w:130,h:20},
    {x:550,y:H-220,w:100,h:20},
    {x:800,y:H-180,w:80,h:20,moving:true,range:80,dir:1,speed:1,startX:800},
    {x:1100,y:H-250,w:130,h:20},
    {x:1400,y:H-150,w:80,h:20},
    {x:1650,y:H-200,w:100,h:20,moving:true,range:120,dir:-1,speed:1.2,startX:1650},
    {x:2000,y:H-180,w:180,h:20},
    {x:2300,y:H-280,w:80,h:20},
    {x:2600,y:H-220,w:130,h:20},
    {x:2900,y:H-150,w:100,h:20,moving:true,range:100,dir:1,speed:1,startX:2900},
    {x:3300,y:H-250,w:80,h:20},
    {x:3600,y:H-200,w:130,h:20},
    {x:3900,y:H-180,w:180,h:20},
    {x:4200,y:H-300,w:80,h:20},
    {x:4500,y:H-220,w:130,h:20},
    {x:4800,y:H-150,w:200,h:20}
  ];

  apples = [
    {x:350,y:H-200,taken:false},
    {x:580,y:H-270,taken:false},
    {x:1150,y:H-300,taken:false},
    {x:1700,y:H-250,taken:false},
    {x:2350,y:H-330,taken:false},
    {x:2650,y:H-270,taken:false},
    {x:3350,y:H-300,taken:false},
    {x:3950,y:H-230,taken:false},
    {x:4550,y:H-270,taken:false}
  ];

  crows = [];
  totalCrowsSpawned = 0;
  for(let i=0;i<5;i++){
    spawnCrow(player.x + 500 + i*400);
  }

  clouds = [];
  cherryBlossoms = [];
  for(let i=0;i<8;i++){
    clouds.push({x:i*550+Math.random()*200,y:40+Math.random()*80,w:70,h:35,speed:0.25});
  }
  for(let i=0;i<25;i++){
    cherryBlossoms.push({
      x:Math.random()*5000,y:Math.random()*H,
      vx:-0.4-Math.random()*0.4,vy:0.4+Math.random()*0.4,
      size:2+Math.random()*3,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.04
    });
  }
}

function spawnCrow(x){
  const y = H - 360 + Math.random()*160;
  crows.push({
    x:x,
    y:y,
    baseY:y,
    vx:-2.2-Math.random()*1.8,
    w:34,h:26,
    time:Math.random()*Math.PI*2,
    waveSpeed:0.015+Math.random()*0.015,
    wingPhase:Math.random()*Math.PI*2
  });
  totalCrowsSpawned++;
}

function resetPlayer(){
  player.x = 100;
  player.y = H-150;
  player.vx = 0;
  player.vy = 0;
  player.hp = 5;
  player.invincible = 0;
  player.grounded = false;
  player.ducking = false;
  camera.x = 0;
  lastCrowSpawnX = 0;
  currentScore = 0;
  currentDistance = 0;
}

// ========== کنترل‌ها ==========
const keys = {};
let touchLeft = false;
let touchRight = false;

// کنترل کیبورد
window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  
  // پرش با W یا Space
  if ((e.code === 'KeyW' || e.code === 'Space') && player.grounded && !player.ducking && gameRunning) {
    player.vy = player.jumpPower;
    playSound('jump');
  }
  
  // تغییر وضعیت نشستن
  if (e.code === 'KeyS') {
    player.ducking = true;
  }
  
  // قطع/وصل موسیقی
  if (e.code === 'KeyM') {
    musicOn = !musicOn;
    if (musicOn) playMusic();
  }
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;
  if (e.code === 'KeyS') {
    player.ducking = false;
  }
});

// کنترل لمسی - فقط در موبایل فعال میشه
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const jumpBtn = document.getElementById('jumpBtn');
const duckBtn = document.getElementById('duckBtn');

// فقط اگر در موبایل هستیم (عرض کمتر از 768px)
if (window.innerWidth < 768) {
  // دکمه چپ
  leftBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    touchLeft = true;
  });
  leftBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    touchLeft = false;
  });
  leftBtn.addEventListener('touchcancel', function(e) {
    e.preventDefault();
    touchLeft = false;
  });

  // دکمه راست
  rightBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    touchRight = true;
  });
  rightBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    touchRight = false;
  });
  rightBtn.addEventListener('touchcancel', function(e) {
    e.preventDefault();
    touchRight = false;
  });

  // دکمه پرش
  jumpBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (player.grounded && !player.ducking && gameRunning) {
      player.vy = player.jumpPower;
      playSound('jump');
    }
  });

  // دکمه نشستن
  duckBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    player.ducking = true;
  });
  duckBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    player.ducking = false;
  });
  duckBtn.addEventListener('touchcancel', function(e) {
    e.preventDefault();
    player.ducking = false;
  });
}

// ========== آپدیت ==========
function update(){
  if(!gameRunning||gameOver) return;

  // حرکت با کیبورد یا لمس
  if (keys['KeyA'] || keys['ArrowLeft'] || touchLeft) {
    player.vx = -player.speed;
  } else if (keys['KeyD'] || keys['ArrowRight'] || touchRight) {
    player.vx = player.speed;
  } else {
    player.vx *= 0.7;
  }

  if(Math.abs(player.vx)>0.5&&player.grounded) player.runCycle+=0.2;

  player.vy+=0.55;
  player.x+=player.vx;
  player.y+=player.vy;

  player.grounded=false;
  platforms.forEach(p=>{
    if(p.moving){
      p.x+=p.dir*p.speed;
      if(Math.abs(p.x-p.startX)>p.range)p.dir*=-1;
    }
    if(player.x+player.w>p.x&&player.x<p.x+p.w&&
       player.y+player.h>p.y&&player.y<p.y+p.h){
      if(player.vy>0&&player.y<p.y){
        player.y=p.y-player.h;
        player.vy=0;
        player.grounded=true;
        if(p.moving)player.x+=p.dir*p.speed;
      }
    }
  });

  if(player.x<0)player.x=0;
  if(player.y>H){player.hp=0;endGame(false);}

  camera.x=player.x-W/3;
  if(camera.x<0)camera.x=0;

  if(player.x - lastCrowSpawnX > 450){
    spawnCrow(player.x + 900);
    lastCrowSpawnX = player.x;
  }

  crows.forEach((c,i)=>{
    c.x+=c.vx;
    c.time += c.waveSpeed;
    c.y = c.baseY + Math.sin(c.time)*18;
    c.wingPhase += 0.3;
    
    if(c.x<-100){
      c.x=player.x+700+Math.random()*400;
      c.baseY = H - 360 + Math.random()*160;
      c.y = c.baseY;
      c.time = Math.random()*Math.PI*2;
    }
    
    if(!player.invincible&&
       player.x<c.x+c.w&&player.x+player.w>c.x&&
       player.y<c.y+c.h&&player.y+player.h>c.y){
      player.hp-=2;
      player.invincible=60;
      playSound('hit');
      updateHP();
      if(player.hp<=0)endGame(false);
    }
  });

  apples.forEach(a=>{
    if(!a.taken&&
       player.x<a.x+18&&player.x+player.w>a.x&&
       player.y<a.y+18&&player.y+player.h>a.y){
      a.taken=true;
      player.hp=Math.min(player.maxHp,player.hp+1);
      score+=50;
      playSound('pickup');
      updateHP();
      particles.push({x:a.x,y:a.y,vx:0,vy:-3,life:20,color:'#0f0'});
    }
  });

  if(player.x>finishFlag.x){
    endGame(true);
  }

  if(player.invincible>0)player.invincible--;

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
  particles=particles.filter(p=>p.life>0);

  clouds.forEach(c=>{c.x-=c.speed;if(c.x<-100)c.x=W+100;});
  
  cherryBlossoms.forEach(cb=>{
    cb.x+=cb.vx;cb.y+=cb.vy;cb.rot+=cb.rotSpeed;
    if(cb.y>H||cb.x<-50){
      cb.x=Math.random()*5000;cb.y=-20;
    }
  });

  currentScore = score + Math.floor(player.x/10);
  currentDistance = Math.floor(player.x);
  document.getElementById('score').textContent = currentScore;
  document.getElementById('distance').textContent = currentDistance;
}

function updateHP(){
  document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';
}

function endGame(won){
  gameRunning=false;
  gameOver=true;
  document.getElementById('gameOverText').textContent=won?'🎉 بردی!':'💀 باختی!';
  document.getElementById('finalScore').textContent=currentScore;
  document.getElementById('gameOver').style.display='flex';
  if(animationId)cancelAnimationFrame(animationId);
  loadLeaderboard('leaderboardContainerGameOver', 'loadingTextGameOver');
}

// ========== رندر ==========
function render(){
  ctx.clearRect(0,0,W,H);

  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#16213e');
  grad.addColorStop(0.5,'#0f3460');
  grad.addColorStop(1,'#533483');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,0.2)';
  clouds.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x-camera.x*0.3,c.y,c.w/2,0,Math.PI*2);
    ctx.arc(c.x-camera.x*0.3+25,c.y,c.w/3,0,Math.PI*2);
    ctx.fill();
  });

  cherryBlossoms.forEach(cb=>{
    ctx.save();
    ctx.translate(cb.x-camera.x*0.5,cb.y);
    ctx.rotate(cb.rot);
    ctx.fillStyle='rgba(255,182,193,0.6)';
    ctx.beginPath();
    for(let i=0;i<5;i++){
      ctx.ellipse(0,0,cb.size,cb.size*0.6,i*Math.PI/5,0,Math.PI*2);
    }
    ctx.fill();
    ctx.restore();
  });

  ctx.fillStyle='#533483';
  platforms.forEach(p=>{
    ctx.fillRect(p.x-camera.x,p.y,p.w,p.h);
    ctx.fillStyle='#0f3460';
    ctx.fillRect(p.x-camera.x,p.y,p.w,4);
    ctx.fillStyle='#533483';
  });

  apples.forEach(a=>{
    if(a.taken)return;
    ctx.fillStyle='#e94560';
    ctx.beginPath();
    ctx.arc(a.x-camera.x,a.y,8,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#0f0';
    ctx.fillRect(a.x-camera.x-1.5,a.y-12,3,6);
  });

  crows.forEach(c=>{
    ctx.save();
    ctx.translate(c.x-camera.x+c.w/2,c.y+c.h/2);
    
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(0,0,c.w/2,c.h/2,0,0,Math.PI*2);
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(-c.w/3,-c.h/4,c.w/3.5,0,Math.PI*2);
    ctx.fill();
    
    ctx.fillStyle='#ffa500';
    ctx.beginPath();
    ctx.moveTo(-c.w/2,-c.h/4);
    ctx.lineTo(-c.w/2-7,-c.h/4+2);
    ctx.lineTo(-c.w/2,-c.h/4+4);
    ctx.fill();
    
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(-c.w/3-2,-c.h/4-2,2,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.arc(-c.w/3-2,-c.h/4-2,1,0,Math.PI*2);
    ctx.fill();
    
    const wingFlap = Math.sin(c.wingPhase)*8;
    ctx.fillStyle='#0a0a0a';
    ctx.beginPath();
    ctx.ellipse(0,wingFlap,c.w/1.5,c.h/3,-0.3,0,Math.PI*2);
    ctx.fill();
    
    ctx.restore();
  });

  ctx.fillStyle='#ffd700';
  ctx.fillRect(finishFlag.x-camera.x,finishFlag.y,finishFlag.w,finishFlag.h);
  ctx.fillStyle='#e94560';
  ctx.beginPath();
  ctx.moveTo(finishFlag.x-camera.x+finishFlag.w,finishFlag.y);
  ctx.lineTo(finishFlag.x-camera.x+finishFlag.w+35,finishFlag.y+18);
  ctx.lineTo(finishFlag.x-camera.x+finishFlag.w,finishFlag.y+36);
  ctx.fill();

  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/20;
    ctx.fillRect(p.x-camera.x,p.y,3,3);
    ctx.globalAlpha=1;
  });

  ctx.save();
  if(player.invincible%8<4){
    const h=player.ducking?player.h*0.6:player.h;
    const y=player.ducking?player.y+player.h*0.4:player.y;
    const legOffset = player.grounded ? Math.sin(player.runCycle)*4 : 0;
    
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(player.x-camera.x+player.w/2,player.y+player.h-3,player.w/2.5,4,0,0,Math.PI*2);
    ctx.fill();
    
    ctx.fillStyle='#2d2d44';
    ctx.fillRect(player.x-camera.x+6,y+12,player.w-12,h-12);
    
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(player.x-camera.x,y+14,6,h-20);
    ctx.fillRect(player.x-camera.x+player.w-6,y+14,6,h-20);
    
    ctx.fillStyle='#1a1a2e';
    ctx.fillRect(player.x-camera.x+6,y+h-12+legOffset,8,12);
    ctx.fillRect(player.x-camera.x+player.w-14,y+h-12-legOffset,8,12);
    
    ctx.fillStyle='#ffdbac';
    ctx.beginPath();
    ctx.arc(player.x-camera.x+player.w/2,y+10,10,0,Math.PI*2);
    ctx.fill();
    
    ctx.fillStyle='#0a0a0a';
    ctx.fillRect(player.x-camera.x+4,y+2,26,8);
    ctx.fillRect(player.x-camera.x+2,y+6,5,12);
    ctx.fillRect(player.x-camera.x+player.w-7,y+6,5,12);
    
    ctx.fillStyle='#fff';
    ctx.fillRect(player.x-camera.x+12,y+9,3,3);
    ctx.fillRect(player.x-camera.x+19,y+9,3,3);
    ctx.fillStyle='#000';
    ctx.fillRect(player.x-camera.x+13,y+10,2,2);
    ctx.fillRect(player.x-camera.x+20,y+10,2,2);
    
    ctx.fillStyle='#e94560';
    ctx.beginPath();
    ctx.moveTo(player.x-camera.x+player.w-4,y+12);
    ctx.lineTo(player.x-camera.x+player.w+8,y+20);
    ctx.lineTo(player.x-camera.x+player.w,y+16);
    ctx.fill();
  }
  ctx.restore();
}

// ========== حلقه بازی ==========
function gameLoop(){
  update();
  render();
  if(gameRunning)animationId=requestAnimationFrame(gameLoop);
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOver').style.display='none';
  gameRunning=true;
  gameOver=false;
  score=0;
  resetPlayer();
  createLevel();
  updateHP();
  playMusic();
  if(animationId)cancelAnimationFrame(animationId);
  gameLoop();
}

function restartGame(){
  location.reload();
}

document.addEventListener('click',()=>{if(audioCtx.state==='suspended')audioCtx.resume();});

// ========== توابع امتیاز ==========
function createLeaderboard(scores, containerId) {
  const container = document.getElementById(containerId);
  if(!container) return;
  
  let html = '';
  scores.forEach((s, i) => {
    const rank = i + 1;
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
    html += `<div class="leaderboard-item">
      <span class="rank">${medal}</span>
      <span class="name">${escapeHtml(s.name || 'نینجا')}</span>
      <span class="score">${s.score || 0}</span>
    </div>`;
  });
  container.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function loadLeaderboard(containerId = 'leaderboardContainer', loadingId = 'loadingText') {
  const container = document.getElementById(containerId);
  const loadingEl = document.getElementById(loadingId);
  if(!container) return;
  if(loadingEl) loadingEl.textContent = 'در حال بارگذاری...';
  
  try {
    const scores = await scoreAPI.getScores(20);
    if(scores && scores.length > 0) {
      createLeaderboard(scores, containerId);
    } else {
      container.innerHTML = '<p style="color:#aaa;text-align:center;padding:15px;font-size:clamp(12px,2vw,14px)">هیچ امتیازی ثبت نشده</p>';
    }
  } catch(error) {
    console.error('Error:', error);
    container.innerHTML = '<p style="color:#e94560;text-align:center;padding:15px;font-size:clamp(12px,2vw,14px)">❌ خطا در بارگذاری</p>';
  }
}

function refreshLeaderboard() {
  loadLeaderboard('leaderboardContainer', 'loadingText');
}

async function savePlayerScore() {
  const nameInput = document.getElementById('playerNameInput');
  const statusEl = document.getElementById('saveStatus');
  const name = nameInput.value.trim() || 'نینجا';
  
  statusEl.textContent = '⏳ در حال ثبت...';
  statusEl.className = 'save-status';
  
  try {
    const result = await scoreAPI.saveScore(name, currentScore, currentDistance, totalCrowsSpawned);
    if(result) {
      statusEl.textContent = '✅ امتیاز ثبت شد!';
      statusEl.className = 'save-status';
      nameInput.value = '';
      loadLeaderboard('leaderboardContainerGameOver', 'loadingTextGameOver');
      loadLeaderboard('leaderboardContainer', 'loadingText');
    } else {
      statusEl.textContent = '❌ خطا در ثبت. دوباره تلاش کنید.';
      statusEl.className = 'save-status error';
    }
  } catch(error) {
    statusEl.textContent = '❌ خطا در ارتباط با سرور';
    statusEl.className = 'save-status error';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  loadLeaderboard('leaderboardContainer', 'loadingText');
  document.getElementById('playerNameInput').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') savePlayerScore();
  });
});
